<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script>(function(){try{var t=localStorage.getItem("theme");if(t==="light"||t==="dark")document.documentElement.setAttribute("data-theme",t);}catch(e){}})();</script>
  <title>글 작성 - 김우혁의 블로그 관리자</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css" />
</head>
<body>
  <nav class="site-nav" id="site-nav"></nav>
  <main class="container">
    <h1 class="page-title" id="editor-heading">새 글 작성</h1>
    <section class="editor-main">
      <div class="editor-toolbar">
        <input type="text" data-role="title" id="post-title" placeholder="제목" />
        <select id="post-category"></select>
        <button type="button" class="btn btn-danger" id="delete-category-btn" title="선택한 카테고리 삭제">카테고리 삭제</button>
        <input type="text" id="post-tags" placeholder="태그 (콤마로 구분)" />
      </div>
      <div class="new-category-form" id="new-category-form" style="display:none;">
        <input type="text" id="new-category-slug" placeholder="카테고리 slug (영문 소문자/숫자/하이픈, 예: dev)" />
        <input type="text" id="new-category-name" placeholder="카테고리 이름 (예: 개발)" />
        <button type="button" class="btn" id="new-category-confirm">카테고리 추가</button>
        <button type="button" class="btn btn-secondary" id="new-category-cancel">취소</button>
      </div>
      <div id="toastui-editor"></div>
      <div class="form-error" id="editor-error"></div>
      <div class="editor-actions">
        <button class="btn" id="save-btn">저장</button>
        <button class="btn btn-danger" id="delete-btn" style="display:none;">삭제</button>
      </div>
      <div class="git-commit-panel" id="git-commit-panel" style="display:none;">
        <p>글이 저장됐습니다. 이 글의 마크다운 파일을 git에 커밋하고 GitHub에 푸시할까요?</p>
        <input type="text" id="git-commit-message" placeholder="커밋 메시지" />
        <div class="git-commit-actions">
          <button type="button" class="btn" id="git-commit-btn">커밋 &amp; 푸시</button>
          <button type="button" class="btn btn-secondary" id="git-skip-btn">건너뛰기</button>
        </div>
        <div class="git-commit-status" id="git-commit-status"></div>
      </div>
    </section>
  </main>

  <script src="/vendor/jquery/jquery.min.js"></script>
  <script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/admin-editor.js"></script>
</body>
</html>
