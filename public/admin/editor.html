<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>글 작성 - 김우혁의 블로그 관리자</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css" />
</head>
<body>
  <nav class="site-nav" id="admin-nav"></nav>
  <main class="container">
    <div class="editor-layout">
      <aside class="editor-sidebar">
        <h3>내 글 목록</h3>
        <button class="btn btn-secondary" id="new-post-btn" style="width:100%;margin-bottom:10px;">+ 새 글</button>
        <div id="post-list-sidebar"></div>
      </aside>
      <section class="editor-main">
        <div class="editor-toolbar">
          <input type="text" data-role="title" id="post-title" placeholder="제목" />
          <select id="post-category"></select>
          <input type="text" id="post-tags" placeholder="태그 (콤마로 구분)" />
        </div>
        <div id="toastui-editor"></div>
        <div class="form-error" id="editor-error"></div>
        <div class="editor-actions">
          <button class="btn" id="save-btn">저장</button>
          <button class="btn btn-danger" id="delete-btn" style="display:none;">삭제</button>
        </div>
      </section>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/admin-editor.js"></script>
</body>
</html>
