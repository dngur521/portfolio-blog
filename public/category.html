<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script>(function(){try{var t=localStorage.getItem("theme");if(t==="light"||t==="dark")document.documentElement.setAttribute("data-theme",t);}catch(e){}})();</script>
  <title>카테고리 - 김우혁의 블로그</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <nav class="site-nav" id="site-nav"></nav>
  <main class="container">
    <div class="page-header">
      <h1 class="page-title" id="category-title">카테고리</h1>
      <div class="page-header-actions">
        <select id="category-filter" class="category-filter"></select>
        <select id="sort-field" class="category-filter">
          <option value="date">날짜순</option>
          <option value="updated">수정순</option>
          <option value="title">이름순</option>
        </select>
        <select id="sort-order" class="category-filter">
          <option value="desc">내림차순</option>
          <option value="asc">오름차순</option>
        </select>
        <a class="btn" id="write-post-btn" href="/admin/editor" style="display:none;">+ 새 글 작성</a>
      </div>
    </div>
    <div id="post-list" class="card-grid"></div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/category.js"></script>
</body>
</html>
